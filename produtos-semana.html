*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:#f4f4f4;min-height:100vh;padding:36px 16px 60px}
header{text-align:center;margin-bottom:44px}
.badge{display:inline-block;background:#111;color:#fff;font-size:.72rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:4px 14px;border-radius:20px;margin-bottom:10px}

.week-section{max-width:1200px;margin:0 auto 40px}
.week-label{margin-bottom:18px}
.week-label span{font-size:.82rem;font-weight:700;color:#888;background:#ebebeb;padding:5px 14px;border-radius:20px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:20px}
.card{background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.07);display:flex;flex-direction:column;transition:transform .2s,box-shadow .2s}

.card-media{width:100%;height:630px;overflow:hidden;background:#f0f0f0;position:relative;display:flex;justify-content:center}
.card-media iframe{width:340px;height:800px;border:none;display:block;flex-shrink:0}
.btn-fs{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);background:#ff6a00;color:#fff;border:none;border-radius:20px;padding:8px 18px;font-size:.82rem;font-weight:700;cursor:pointer;z-index:2;box-shadow:0 2px 12px rgba(0,0,0,.4);white-space:nowrap;letter-spacing:.3px}
.btn-fs:hover{background:#e05500}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:9999;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal-inner{position:relative;width:390px;max-width:95vw;height:844px;max-height:92vh}
.modal-inner iframe{width:100%;height:100%;border:none;border-radius:16px}
.modal-close{position:absolute;top:-44px;right:0;background:#fff;color:#111;border:none;border-radius:10px;padding:7px 16px;font-size:.85rem;font-weight:700;cursor:pointer}
.modal-close:hover{background:#eee}
.card-img{width:100%;aspect-ratio:1/1;object-fit:cover;display:block}
.card-placeholder{width:100%;aspect-ratio:1/1;background:linear-gradient(135deg,#eee,#ddd);display:flex;align-items:center;justify-content:center;font-size:3rem;color:#ccc}
.card-body{padding:14px;display:flex;flex-direction:column;gap:8px}
.card-meta{display:flex;align-items:center;gap:5px;font-size:.8rem;color:#999}
.card-meta span{font-weight:600;color:#555}
.heart{color:#e0245e}
.card-links{display:flex;flex-direction:column;gap:7px}
.btn{display:flex;align-items:center;justify-content:center;gap:7px;padding:10px 14px;border-radius:10px;font-size:.82rem;font-weight:600;text-decoration:none;cursor:pointer;border:none;transition:opacity .15s}
.btn:hover{opacity:.87}
.btn svg{width:15px;height:15px;fill:currentColor;flex-shrink:0}
.btn-ali{background:#ff6a00;color:#fff}
.btn-ig{background:linear-gradient(135deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);color:#fff}
.btn-copy{background:#f2f2f2;color:#444;border:1px solid #e0e0e0;font-size:.76rem}
.copied-msg{display:none;font-size:.73rem;color:#22a06b;text-align:center;font-weight:600}
footer{text-align:center;margin-top:40px;color:#ccc;font-size:.78rem}
</style></head><body>

<script>
function cp(l,b){navigator.clipboard.writeText(l).then(()=>{const m=b.parentElement.querySelector('.copied-msg');m.style.display='block';setTimeout(()=>m.style.display='none',2000)})}
function abrirModal(src){document.getElementById('modal-iframe').src=src;document.getElementById('modal').classList.add('open');document.body.style.overflow='hidden'}
function fecharModal(e){if(e&&e.target.closest('.modal-inner'))return;document.getElementById('modal').classList.remove('open');document.getElementById('modal-iframe').src='';document.body.style.overflow=''}
document.addEventListener('keydown',e=>{if(e.key==='Escape')fecharModal()})
</script>
